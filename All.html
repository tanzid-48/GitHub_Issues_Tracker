<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | All</title>

    <!-- link CSS -->
    <link rel="stylesheet" href="./style.css">

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind & daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


</head>

<body>

    <!-- navbar section -->
    <section class=" container mb-5">
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <div class="flex items-center justify-start gap-2">
                    <img src="./assets/github-logo.png" class="w-8 h-8" alt="">
                    <a class=" font-bold text-xl">Github Issue Tracker</a>
                </div>
            </div>
            <div class="flex gap-2">
                <input id="searchBtn" type="text" placeholder=" Search issues"
                    class="input input-bordered  md:w-auto" />
                <!-- <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i> -->

                <div class="rounded-md">
                    <button class="btn btn-primary text-white">+ New Issue</button>
                </div>
            </div>

        </div>
    </section>

    <!-- Button section -->
    <section class=" w-10/12 mx-auto bg-white shadow-xl mb-5 ">
        <div class="flex gap-1 justify-start items-center">
            <button id="all-btn" class=" btn btn-primary px-7 m-4">All </button>
            <button id="open-btn" class="btn  px-7"><span class="">Open</span></button>
            <button id="closed-btn" class="btn  px-7 m-4"><span class="">Closed</span></button>
        </div>
    </section>

    <!-- fetch section  -->
    <section class=" w-10/12 mx-auto bg-white shadow-xl ">

        <!-- Issue and green amd purple stats -->

        <div class="flex justify-between items-center p-4 ">

            <div class="flex items-center gap-2">
                <div class="">
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div class="">
                    <h3 id="issues" class="font-semibold text-xl"></h3>
                    <p class="paragraph">Track and manage your project issues</p>
                </div>
            </div>


            <div class="flex items-center gap-4">
                <div class="flex items-center gap-1">
                    <span class="w-3 h-3 rounded-full bg-green-600"></span>
                    <p>Open</p>
                </div>
                <div class="flex items-center gap-1">
                    <span class="w-3 h-3 rounded-full bg-purple-500"></span>
                    <p>Closed</p>
                </div>
            </div>
        </div>
        <hr class="mb-5 border-gray-300 ">

        <div id="loading-spinner" class="h-[60vh] hidden justify-center items-center">
            <span class="loading loading-bars loading-xs"></span>
            <span class="loading loading-bars loading-sm"></span>
            <span class="loading loading-bars loading-md"></span>
            <span class="loading loading-bars loading-lg"></span>
            <span class="loading loading-bars loading-xl"></span>
        </div>
        <div id="card-container" class="grid grid-cols-4 gap-2">

        </div>


        <!-- Open the modal using ID.showModal() method -->

        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">

                <div id="modal-container" class="space-y-5">

                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>

            </div>
        </dialog>
    </section>
    <script src="./all.js"></script>
</body>

</html>
