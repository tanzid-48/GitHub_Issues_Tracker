<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <!-- link CSS -->
    <link rel="stylesheet" href="./style.css">

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind & daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>


<body>

    <main>
      <section class="w-96 mx-auto my-10 shadow-2xl space-y-4 p-6 bg-white rounded-xl">

  <div class="space-y-4">
    <img class="mx-auto" src="./assets/github-logo.png" alt="">
    <h2 class="font-bold text-2xl text-center">GitHub Issues Tracker</h2>
    <p class="paragraph text-center">Sign in to manage your issues</p>
  </div>

  <div class="">
    <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-full border p-4">
      <p class="font-bold">Username</p>
      <input type="text" class="input w-full" placeholder="Enter Username"/>
      <span class="text-blue-400">Default: admin</span>

      <p class="font-bold mt-3">Password</p>
      <input type="password" class="input w-full" placeholder="Enter Password"/>
      <span class="text-blue-400">Default: admin123</span>

      <button id="login-btn" class="btn btn-primary mt-4 w-full">Log In</button>
    </fieldset>

    <div class="flex items-center mt-5 gap-3">
      <hr class="flex-1 border-gray-300">
      <span>OR</span>
      <hr class="flex-1 border-gray-300">
    </div>

    <p class="paragraph mt-5 text-center">Demo Credentials:</p>

    <div class="card card-body text-center mx-auto w-80 mt-5 bg-base-200 shadow-2xl">
      <h3 class="font-semibold">Username: <span class="paragraph">admin</span></h3>
      <h3 class="font-semibold">Password: <span class="paragraph">admin123</span></h3>
    </div>
  </div>

</section>
    </main>
   <script src="./script.js"></script>
</body>
</html>
